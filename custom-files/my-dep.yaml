apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: my-dep
  name: my-dep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-dep
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: my-dep
    spec:
      tolerations :
        - key : "env"
          operator : "Equal"
          value : "prod"
          effect : "NoSchedule"
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}
