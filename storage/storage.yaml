apiVersion : v1
kind : PersistentVolume
metadata :
    name : my-pv
    labels :
        app : prod
spec :
    storageClassName : manual
    accessModes :
        - ReadWriteOnce
    capacity :
        storage : 1Gi
    persistentVolumeReclaimPolicy : Retain
    hostPath :
        path : /home/system/kube/storage/data
---
apiVersion : v1
kind : PersistentVolumeClaim
metadata :
    name : my-pvc
    namespace : my-st
    labels :
        app : prod
spec :
    storageClassName : manual
    resources:
        requests :
            storage : 1Gi
    accessModes :
        - ReadWriteOnce
    selector :
        matchLabels :
            app : prod
---
apiVersion : apps/v1
kind : Deployment
metadata :
    name : storage-deployment
    namespace : my-st
    labels :
        app : prod
spec :
    replicas : 1
    selector :
        matchLabels :
            app : prod
    template :
        metadata :
            labels :
                app : prod
        spec :
            containers :
                - name : nginx-container
                  image : nginx
                  volumeMounts :
                    - name : storage
                      mountPath : /mnt
            volumes :
                - name : storage
                  persistentVolumeClaim :
                    claimName : my-pvc
