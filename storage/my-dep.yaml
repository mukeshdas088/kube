apiVersion: v1
kind: PersistentVolume
metadata:
  name: my-pv
  labels:
    app: red
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /home/system/kube/storage/dir
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-pvc
spec:
  storageClassName: manual
  resources:
    requests:
      storage: 1Gi
  accessModes:
    - ReadWriteOnce
  selector:
    matchLabels:
      app: red
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-dep
  labels:
    app: red
spec:
  replicas: 3
  selector:
    matchLabels:
      app: red
  template:
    metadata:
      labels:
        app: red
    spec:
      volumes:
        - name: my-vol
          persistentVolumeClaim:
            claimName: my-pvc
      tolerations:
        - key: env
          operator: Equal
          value: prod
          effect: NoSchedule
      nodeSelector:
        kubernetes.io/hostname: k8s-master
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: type
                  operator: In
                  values:
                    - gpu
      initContainers:
        - name: busybox
          image: busybox
          command: ["sh","-c"]
          args:
            - |
              echo "Testing service for container initialization...."
              until nslookup my-svc.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local;do
                echo "my-svc not found"
                sleep 2
              done
      containers:
        - name: nginx
          image: nginx
          command: ["/bin/sh","-c"]
          args:
            - |
              ls -l /mnt
              sh /mnt/file.sh
              sleep 100
          volumeMounts:
            - name: my-vol
              mountPath: /mnt
