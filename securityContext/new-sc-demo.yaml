apiVersion: v1
kind: Pod
metadata:
  name: security-context-demo
spec:
  # Pod-level: Applies to all containers unless overridden
  securityContext:
    runAsUser: 3000      # Default UID for containers
    runAsGroup: 4000     # Default primary GID
    fsGroup: 2000        # Changes volume permissions to GID 2000
    seLinuxOptions:      # Sets the SELinux context
      level: "s0:c123,c456"

  volumes:
  - name: shared-data
    emptyDir: {}

  containers:
  # Container 1: Inherits the Pod-level UID 3000
  - name: writer
    image: alpine
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Writing data..." > /data/message.txt;
        ls -l /data;
        sleep 10000;
    volumeMounts:
    - name: shared-data
      mountPath: /data

  # Container 2: Overrides UID to 5000, but still bound by fsGroup 2000
  - name: reader
    image: alpine
    command: ["/bin/sh", "-c"]
    args:
      - |
        sleep 5; # Wait for writer
        echo "Reading data as user $(id -u):"
        cat /data/message.txt;
        ls -l /data;
        sleep 10000;
    securityContext:
      runAsUser: 5000    # Overrides Pod-level 3000
    volumeMounts:
    - name: shared-data
      mountPath: /data
