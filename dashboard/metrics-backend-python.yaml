apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-backend-python
  namespace: default
data:
  default.conf: |
    server {
        listen 5000;
        server_name localhost;

        # Changed path selector root to catch incoming API traffic smoothly
        location /api {
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
            return 200 '{"node_name":"k8s-master","disk_total":250,"disk_used":112,"disk_free":138,"disk_pct":45,"mem_total":16,"mem_used":4,"mem_pct":25,"uptime":"42d 11h"}';
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-stack
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-ui
  template:
    metadata:
      labels:
        app: dashboard-ui
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      containers:
      - name: frontend-nginx
        image: nginx:alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html

      - name: backend-metrics
        image: nginx:alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: backend-volume
          mountPath: /etc/nginx/conf.d
      
      volumes:
      - name: html-volume
        configMap:
          name: dashboard-frontend-html
      - name: backend-volume
        configMap:
          name: metrics-backend-python
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend-svc
  namespace: default
spec:
  ports:
  - name: http
    port: 80
    targetPort: 80
  selector:
    app: dashboard-ui
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend-svc
  namespace: default
spec:
  ports:
  - name: api
    port: 5000
    targetPort: 5000
  selector:
    app: dashboard-ui
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-dashboard-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: node-dashboard.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dashboard-frontend-svc
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: dashboard-backend-svc
            port:
              number: 5000
