apiVersion: v1
kind: Pod
metadata:
  name: secure-db
  labels:
    app: database # <-- This label is crucial for the next step!
spec:
  containers:
  - name: redis
    image: redis:alpine
  affinity:
    nodeAffinity:
      # HARD NODE AFFINITY: Must land on an SSD node
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: disktype
            operator: In
            values:
            - ssd
